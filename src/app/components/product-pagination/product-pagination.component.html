<div class="pagination-container footer-bar">
    <div class="left">
        Total de registros: {{ totalRows }}
    </div>
    <div class="right">
        <!-- <div class="registros-por-pagina"> -->
        <label>Mostrar:</label>
        <select [(ngModel)]="rowsByPage" (change)="changeRowsByPage(rowsByPage)">
            <option *ngFor="let option of rowOptions" [value]="option">
                {{ option }}
            </option>
        </select>
        <!-- </div> -->

        <div class="paginas pagination" *ngIf="totalPages > 1">
            <button *ngFor="let pagina of [].constructor(totalPages); let i = index" (click)="changePage(i + 1)"
                [class.activa]="currentPage === i + 1">
                {{ i + 1 }}
            </button>
        </div>
    </div>
</div>
